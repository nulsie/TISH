<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TISH - Dependency Scanner</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
    <style>

        .scanner-layout {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
            max-width: 800px;
            margin: 0 auto var(--space-5) auto;
        }
        .textarea-field {
            background: var(--app-white);
            border: 1px solid var(--app-border);
            border-radius: var(--radius-subtle);
            padding: var(--space-3);
            width: 100%;
            font-family: var(--font-mono);
            font-size: 0.95rem;
            color: var(--app-black);
            resize: vertical;
            min-height: 200px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .textarea-field:focus {
            outline: none;
            border-color: var(--app-spicy);
            box-shadow: 0 0 0 4px var(--app-glow);
        }
        .controls-row {
            display: flex;
            gap: var(--space-2);
            justify-content: flex-end;
        }
        .select-field {
            padding: 0 var(--space-3);
            border-radius: var(--radius-pill);
            border: 1px solid var(--app-border);
            font-family: var(--font-primary);
            font-size: 0.95rem;
            background: var(--app-white);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">TI<span class="text-spicy">SH</span></div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Search</a>
            <a href="scanner.html" class="nav-link" style="color: var(--app-black); font-weight: 700;">SBOM Scanner</a>
            <a href="docs.html" class="nav-link">Docs</a>
            
        </div>
    </nav>

    <div class="layout-container section">
        <header class="hero-header" style="text-align: center;">
            <h1 class="text-display" style="text-align: left;">SBOM <span>Scanner.</span></h1>
            <p class="text-body-large" style="margin: 0; text-align: left;">
                Paste your package.json, requirements.txt, or a raw list to cross-reference dependencies against the OSV.dev database.
            </p>
        </header>

        <div class="scanner-layout">
            <textarea id="dependencyInput" class="textarea-field" placeholder="Paste here...&#10;&#10;Examples:&#10;{&#10;  &quot;dependencies&quot;: { &quot;express&quot;: &quot;^4.17.1&quot; }&#10;}&#10;&#10;OR&#10;&#10;requests==2.25.1&#10;&#10;OR&#10;&#10;lodash:4.17.20"></textarea>
            
            <div class="controls-row">
                <select id="ecosystemSelect" class="select-field">
                    <option value="npm">NPM (JavaScript/Node)</option>
                    <option value="PyPI">PyPI (Python)</option>
                    <option value="Maven">Maven (Java)</option>
                    <option value="Go">Go</option>
                    <option value="RubyGems">RubyGems</option>
                    <option value="Packagist">Packagist (PHP)</option>
                    <option value="crates.io">Crates.io (Rust)</option>
                </select>
                <button id="scanBtn" class="btn btn-primary">Scan Dependencies</button>
            </div>
        </div>

        <div id="statusMessage" class="hidden status-text pulse-text"></div>
        
        <div id="resultsContainer" class="results-grid"></div>
    </div>
    <footer style="text-align: center; padding: var(--space-5); color: var(--app-gray); font-size: 0.85rem;">
        TISH // By <a href="https://nulsie.github.io/w" class="text-spicy">nulsie</a>
    </footer>

    <script src="scanner.js"></script>
</body>
</html>
